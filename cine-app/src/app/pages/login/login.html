<div class="container">
    <div class="login-box">
        <h1>¡Bienvenido!</h1>
        <p class="subtitle">
            Inicia sesión para acceder a nuestros beneficios
        </p>

        <form>
            <label>Usuario:</label>
            <input type="email" placeholder="Ingresa tu correo" required>

            <label>Contraseña:</label>
            <input type="password" placeholder="Ingresa tu contraseña" required>

            <button type="button" class="btn-login" routerLink="/inicio">
                Iniciar sesión
            </button>
        </form>

        <a href="recuperar.html" class="forgot-password">
            ¿Olvidaste tu contraseña?
        </a>

        <p class="social-text">O inicia sesión con:</p>

        <div class="social-icons">
            <a href="https://www.facebook.com/login" target="_blank">
                <img src="assets/img/facebook.png" alt="Facebook">
            </a>
            <a href="https://www.instagram.com/accounts/login/" target="_blank">
                <img src="assets/img/instagram.png" alt="Instagram">
            </a>
        </div>

        <div class="register-section">
            <span>¿No tienes cuenta?</span>
            <a routerLink="/registro" class="btn-register">
                Regístrate aquí
            </a>
        </div>
    </div>
</div>
