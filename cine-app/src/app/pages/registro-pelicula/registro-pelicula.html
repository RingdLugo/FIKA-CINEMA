<div class="app-container">

  <!-- alerta -->
  @if (alertMessage) {
    <div class="alert-banner" [ngClass]="alertType">
      <span>{{ alertMessage }}</span>
      <button (click)="alertMessage = ''">&times;</button>
    </div>
  }

  <!-- panel principal -->
  <div class="main-panel">

    <!-- formulario -->
    <div class="form-panel">
      <div class="section-title">Datos de la película</div>

      <form id="peliculaForm" class="form-fields" (submit)="$event.preventDefault()">
        
        <!-- id -->
        <div class="row">
          <label for="noPelicula">ID / No. Película</label>
          <div style="display: flex; gap: 8px; align-items: center;">
            <input type="text" id="noPelicula" name="noPelicula" [(ngModel)]="movieForm.id" class="input-box short" placeholder="Ej: 550 o custom_1">
            <button type="button" class="btnform buscar" style="min-width: 80px; padding: 4px 10px; margin: 0; font-size: 12px; height: 28px; line-height: 1;" (click)="buscarPelicula()">🔍 Buscar ID</button>
          </div>
        </div>
        
        <!-- titulo -->
        <div class="row">
          <label for="titulo">Título</label>
          <input type="text" id="titulo" name="title" [(ngModel)]="movieForm.title" class="input-box long" placeholder="Ej: El Club de la Pelea">
        </div>

        <!-- titulo original -->
        <div class="row">
          <label for="tituloOriginal">Título Original</label>
          <input type="text" id="tituloOriginal" name="originalTitle" [(ngModel)]="movieForm.originalTitle" class="input-box long" placeholder="Ej: Fight Club">
        </div>

        <!-- generos -->
        <div class="row">
          <label for="generos">Géneros</label>
          <input type="text" id="generos" name="genre" [(ngModel)]="movieForm.genre" class="input-box long" placeholder="Acción, Drama, Suspenso...">
        </div>

        <!-- saga -->
        <div class="row">
          <label for="serie">Serie / Saga</label>
          <input type="text" id="serie" name="serie" [(ngModel)]="movieForm.serie" class="input-box long" placeholder="Ej: Clásicos de Suspenso">
        </div>

        <!-- duracion -->
        <div class="row">
          <label for="duracion">Duración</label>
          <input type="text" id="duracion" name="duration" [(ngModel)]="movieForm.duration" class="input-box short" placeholder="Ej: 139 min">
        </div>

        <!-- trailer -->
        <div class="row">
          <label for="trailer">URL del Trailer</label>
          <input type="text" id="trailer" name="trailer" [(ngModel)]="movieForm.trailer" class="input-box long" placeholder="Ej: https://www.youtube.com/embed/SUXWAEX2jlg">
        </div>

        <!-- sinopsis -->
        <div class="row sinopsis-row">
          <label for="sinopsis">Sinopsis</label>
          <textarea id="sinopsis" name="description" [(ngModel)]="movieForm.description" class="input-box sinopsis" placeholder="Breve descripción de la película..."></textarea>
        </div>

        <!-- estado -->
        <div class="row">
          <label for="estado">Estado</label>
          <select id="estado" name="estado" [(ngModel)]="movieForm.estado" class="input-box short">
            <option value="">Seleccionar</option>
            <option value="estreno">Estreno</option>
            <option value="preventa">Preventa</option>
            <option value="preestreno">Pre-estreno</option>
            <option value="cartelera">En cartelera</option>
            <option value="proximamente">Próximamente</option>
          </select>
        </div>

        <!-- clasificacion -->
        <div class="row">
          <label for="clasificacion">Clasificación</label>
          <select id="clasificacion" name="classification" [(ngModel)]="movieForm.classification" class="input-box short">
            <option value="">Seleccionar</option>
            <option value="AA">AA (Apta niños)</option>
            <option value="A">A (Todo público)</option>
            <option value="B">B (Mayores 12)</option>
            <option value="B15">B15 (Mayores 15)</option>
            <option value="C">C (Adultos)</option>
          </select>
        </div>

        <!-- exhibicion -->
        <div class="row">
          <label for="allCines">Exhibición</label>
          <div style="display: flex; gap: 8px; align-items: center; height: 28px;">
            <input type="checkbox" id="allCines" name="allCines" [(ngModel)]="movieForm.allCines" style="transform: scale(1.1); cursor: pointer;">
            <span style="font-weight: bold; color: #1a1a1a; cursor: pointer; text-shadow: 1px 1px 1px #fff;" (click)="movieForm.allCines = !movieForm.allCines">
              Disponible en todos los complejos de FIKA
            </span>
          </div>
        </div>

        @if (!movieForm.allCines) {
          <!-- estado local -->
          <div class="row">
            <label for="targetState">Estado</label>
            <select id="targetState" name="targetState" [(ngModel)]="movieForm.targetState" class="input-box medium" (change)="movieForm.targetCity = ''; movieForm.targetCine = ''">
              <option value="">Seleccionar Estado</option>
              @for (state of statesList; track state) {
                <option [value]="state">{{ state }}</option>
              }
            </select>
          </div>

          <!-- ciudad local -->
          <div class="row">
            <label for="targetCity">Ciudad</label>
            <select id="targetCity" name="targetCity" [(ngModel)]="movieForm.targetCity" class="input-box medium" [disabled]="!movieForm.targetState" (change)="movieForm.targetCine = ''">
              <option value="">Seleccionar Ciudad</option>
              @for (city of citiesList; track city.name) {
                <option [value]="city.name">{{ city.name }}</option>
              }
            </select>
          </div>

          <!-- cine local -->
          <div class="row">
            <label for="targetCine">Cine Favorito</label>
            <select id="targetCine" name="targetCine" [(ngModel)]="movieForm.targetCine" class="input-box medium" [disabled]="!movieForm.targetCity">
              <option value="">Seleccionar Cine</option>
              @for (cine of cinesList; track cine) {
                <option [value]="cine">{{ cine }}</option>
              }
            </select>
          </div>
        }

        <!-- director -->
        <div class="row">
          <label for="reparto1">Director</label>
          <input type="text" id="reparto1" name="director" [(ngModel)]="movieForm.director" class="input-box long" placeholder="Director de la película">
        </div>

        <!-- actores -->
        <div class="row">
          <label for="reparto2">Reparto (Actores)</label>
          <input type="text" id="reparto2" name="actors" [(ngModel)]="movieForm.actors" class="input-box long" placeholder="Actores principales separados por comas">
        </div>

        <!-- pais -->
        <div class="row">
          <label for="pais">País</label>
          <input type="text" id="pais" name="country" [(ngModel)]="movieForm.country" class="input-box medium" placeholder="Ej: Estados Unidos">
        </div>

        <!-- distribuidor -->
        <div class="row">
          <label for="distribuidora">Distribuidora</label>
          <input type="text" id="distribuidora" name="distributor" [(ngModel)]="movieForm.distributor" class="input-box medium" placeholder="Ej: 20th Century Fox">
        </div>

        <!-- fecha estreno -->
        <div class="row">
          <label for="fechaEstreno">Fecha Estreno</label>
          <input type="text" id="fechaEstreno" name="releaseDate" [(ngModel)]="movieForm.releaseDate" class="input-box short" placeholder="Ej: 1999-10-15">
        </div>

        <!-- poster url -->
        <div class="row">
          <label for="posterUrl">URL Póster</label>
          <input type="text" id="posterUrl" name="poster" [(ngModel)]="movieForm.poster" class="input-box long" placeholder="Ej: https://example.com/imagen.jpg">
        </div>

        <!-- subir poster -->
        <div class="row">
          <label for="posterUpload">Ó Subir Imagen</label>
          <input type="file" id="posterUpload" name="posterUpload" (change)="onFileSelected($event)" accept="image/*" class="input-box long">
        </div>
      </form>
    </div>

    <!-- vista poster -->
    <div class="poster-panel">
      <div class="section-title poster-title">— POSTER —</div>
      <div class="poster-box">
        <img [src]="movieForm.poster || 'https://images.unsplash.com/photo-1607604053594-86421d8b4761?w=400'"
             alt="Previsualización del póster" id="posterPreview">
      </div>
    </div>

  </div>

  <!-- botones de accion -->
  <div class="toolbar">
    <div class="toolbar-label">Mantenimiento</div>
    <div class="buttons-group">
      <button type="button" class="btnform insert" (click)="insertarPelicula()">📥 Insertar</button>
      <button type="button" class="btnform buscar" (click)="buscarPelicula()">🔍 Buscar</button>
      <button type="button" class="btnform modificar" (click)="modificarPelicula()">🖊️ Modificar</button>
      <button type="button" class="btnform eliminar" (click)="eliminarPelicula()">🗑️ Eliminar</button>
      <a routerLink="/" class="btnform volver">
          ↩️ Volver
      </a>
    </div>
  </div>

</div>
