

<div class="container mt-4">
    <div class="register-box">
        <div class="text-start mb-3">
            <a routerLink="/login" class="btn-back">
                <i class="bi bi-arrow-left"></i> Volver a Login
            </a>
        </div>
        <h1>Crear Cuenta</h1>
        <p class="subtitle">
            Regístrate y disfruta de la experiencia FIKA Cinema
        </p>

        <form (ngSubmit)="onRegister()">
            <label>Nombre completo:</label>
            <input type="text" name="nombreCompleto" [(ngModel)]="nombreCompleto" placeholder="Ingresa tu nombre completo" required>

            <label>Correo electrónico:</label>
            <input type="email" name="email" [(ngModel)]="email" placeholder="Ingresa tu correo" required>

            <label>Contraseña:</label>
            <input type="password" name="password" [(ngModel)]="password" placeholder="Crea una contraseña" required>

            <label>Confirmar contraseña:</label>
            <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" placeholder="Confirma tu contraseña" required>

            @if (errorMessage) {
                <div class="error-message" style="color: #ff4d4d; margin-bottom: 15px; font-size: 0.9em;">
                    {{ errorMessage }}
                </div>
            }
            @if (successMessage) {
                <div class="success-message" style="color: #4CAF50; margin-bottom: 15px; font-size: 0.9em;">
                    {{ successMessage }}
                </div>
            }

            <button type="submit" class="btn-primary w-100" [disabled]="loading">
                {{ loading ? 'Creando cuenta...' : 'Crear Mi Cuenta' }}
            </button>
        </form>
        
        <div class="support-section">
            <p>
                ¿Tienes problemas con tu cuenta?<br>
                Escríbenos a 
                <a href="mailto:fikacinema@atencion.com" class="support-email">
                    fikacinema@atencion.com
                </a>
                </p>
        </div>
    </div>
</div>
